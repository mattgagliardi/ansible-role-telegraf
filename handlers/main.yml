---
# handlers/main.yml — Telegraf service handlers

- name: Restart telegraf
  ansible.builtin.service:
    name: "{{ telegraf_service_name | default('telegraf') }}"
    state: restarted

- name: Reload telegraf
  ansible.builtin.service:
    name: "{{ telegraf_service_name | default('telegraf') }}"
    state: reloaded

- name: Restart telegraf on Windows
  ansible.windows.win_service:
    name: telegraf
    state: restarted

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true
